<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart System</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .product { margin-bottom: 15px; }
        .msg { color: green; font-size: 12px; }
    </style>
</head>
<body>

<h2>Cart: <span id="cartCount">0</span></h2>

<div class="product">
    <p>Product 1</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 2</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 3</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 4</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<script>
$(function(){

    let count = 0;

    $(".addBtn").click(function(){

        count++;
        $("#cartCount").text(count);

        $(this).prop("disabled", true);
        $(this).next(".msg").text("Added!");

    });

});
</script>

</body>
</html>
